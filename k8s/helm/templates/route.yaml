apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: task-manager-frontend
  namespace: {{ .Values.namespace }}
spec:
  host: {{ .Values.route.host | quote }}
  path: {{ .Values.route.frontendPath | quote }}
  port:
    targetPort: http
  to:
    kind: Service
    name: frontend-service
    weight: 100
  wildcardPolicy: None
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: task-manager-backend
  namespace: {{ .Values.namespace }}
spec:
  host: {{ .Values.route.host | quote }}
  path: {{ .Values.route.apiPath | quote }}
  port:
    targetPort: http
  to:
    kind: Service
    name: backend-service
    weight: 100
  wildcardPolicy: None

namespace: app1

postgres:
  image:
    repository: docker.io/dragos93/app1-postgres
    tag: latest
    pullPolicy: IfNotPresent
  storageClassName: crc-csi-hostpath-provisioner
  storageSize: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

backend:
  image:
    repository: docker.io/dragos93/app1-backend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 300m

frontend:
  image:
    repository: docker.io/dragos93/app1-frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi
      cpu: 200m

service:
  frontendPort: 8080
  backendPort: 3000
  postgresPort: 5432

route:
  host: www.ro-store.com
  frontendPath: /
  apiPath: /api

config:
  dbUser: postgres
  dbName: taskdb
  dbHost: postgres-service
  dbPort: "5432"
  adminUser: admin

secret:
  dbPassword: password
  jwtSecret: your-super-secret-jwt-key-change-this
